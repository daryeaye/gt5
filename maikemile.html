    function closeCustomPopup() {
      document.getElementById("customPopupOverlay").style.display = "none";
      document.getElementById("customPopupMessage").textContent = "";
      document.getElementById("customPopupButtons").innerHTML = "";

    function showCustomPopup(message, buttons = [{ text: "OK", action: closeCustomPopup }]) {
      const overlay = document.getElementById("customPopupOverlay");
      const msg = document.getElementById("customPopupMessage");
      const btnWrap = document.getElementById("customPopupButtons");

      msg.textContent = message;
      btnWrap.innerHTML = "";

      buttons.forEach(btn => {
        const b = document.createElement("button");
        b.className = "popupBtn";
        b.textContent = btn.text;
        b.onclick = () => {
          closeCustomPopup();
          if (btn.action) btn.action();
        };
        btnWrap.appendChild(b);
      });

      overlay.style.display = "flex";
    }

    function showMessagePopup(message) {
      showCustomPopup(message, [{ text: "OK", action: closeCustomPopup }]);
    }

    async function runCanvasTransition(action) {
      const overlay = document.getElementById("pageTransitionOverlay");
      overlay.style.pointerEvents = "auto";
      overlay.style.opacity = "1";

      await wait(60);
      overlay.style.opacity = "0";

    function setAuthModalStatus(message, isError = false) {
      const status = document.getElementById("authModalStatus");

    function openAuthOverlay(prefillUsername = "") {
      const overlay = document.getElementById("authOverlay");
      const usernameInput = document.getElementById("auth-username");
      const passwordInput = document.getElementById("auth-password");

      if (prefillUsername) {
        usernameInput.value = prefillUsername;
      } else if (authUsername) {
        usernameInput.value = authUsername;
      }

      passwordInput.value = "";
      setAuthModalStatus("Forgot your password? Please register a new account to start over.", false);
      overlay.style.display = "flex";
      usernameInput.focus();
    }

    function closeAuthOverlay() {
      document.getElementById("authOverlay").style.display = "none";
      setAuthModalStatus("", false);
    }

    function maybeRequireAuthOverlay() {
      if (!authToken) {
        openAuthOverlay(authUsername || "");
      }
    }

    function updateAuthUI() {
      const signedIn = !!authToken;
      document.getElementById("logoutBtn").style.display = signedIn ? "inline-block" : "none";
      setAuthStatus(signedIn ? ("Logged in as " + (authUsername || "student")) : "Not logged in", false);
      if (signedIn) {
        closeAuthOverlay();
      }
    }

    function saveSessionLocally(token, username) {
      authToken = token || "";
      authUsername = username || "";
      localStorage.setItem(SESSION_STORAGE.token, authToken);
      localStorage.setItem(SESSION_STORAGE.username, authUsername);
      updateAuthUI();
    }

    function clearSessionLocally() {
      authToken = "";
      authUsername = "";
      localStorage.removeItem(SESSION_STORAGE.token);
      localStorage.removeItem(SESSION_STORAGE.username);
      updateAuthUI();
    }

    function restoreSessionLocally() {
      authToken = localStorage.getItem(SESSION_STORAGE.token) || "";
      authUsername = localStorage.getItem(SESSION_STORAGE.username) || "";
      updateAuthUI();
    }

    function getTypeableInputs() {
      return Array.from(document.querySelectorAll("#container .typeable"));
    }

    function getInputSnapshot() {
      const snapshot = {};
      getTypeableInputs().forEach(el => {
        if (el.id) {
          snapshot[el.id] = el.value || "";
        }
      });
      return snapshot;
    }

    function applyInputSnapshot(snapshot) {
      getTypeableInputs().forEach(el => {
        if (!el.id) return;
        el.value = snapshot && Object.prototype.hasOwnProperty.call(snapshot, el.id)
          ? (snapshot[el.id] ?? "")
          : "";
      });
    }

    function drawStoredLine(tempEndX = null, tempEndY = null) {
      const canvas = document.getElementById("drawCanvas");
      if (!canvas || !drawCtx) return;

      drawCtx.clearRect(0, 0, canvas.width, canvas.height);
      let line = drawingState.line;

      if (!line && tempEndX === null) return;

      const x1 = line ? line.x1 : drawStartX;
      const y1 = line ? line.y1 : drawStartY;
      const x2 = line ? line.x2 : tempEndX;
      const y2 = line ? line.y2 : tempEndY;

      if ([x1, y1, x2, y2].some(v => typeof v !== "number")) return;

      drawCtx.beginPath();
      drawCtx.moveTo(x1, y1);
      drawCtx.lineTo(x2, y2);
      drawCtx.strokeStyle = "red";
      drawCtx.lineWidth = 2;
      drawCtx.stroke();
    }

    function getDrawingSnapshot() {
      return {
        line: drawingState.line
          ? {
              x1: drawingState.line.x1,
              y1: drawingState.line.y1,
              x2: drawingState.line.x2,
              y2: drawingState.line.y2
            }
          : null
      };
    }

    function applyDrawingSnapshot(snapshot) {
      if (snapshot && snapshot.line && typeof snapshot.line === "object") {
        drawingState.line = {
          x1: Number(snapshot.line.x1),
          y1: Number(snapshot.line.y1),
          x2: Number(snapshot.line.x2),
          y2: Number(snapshot.line.y2)
        };
      } else {
        drawingState.line = null;
      }
      drawStoredLine();
    }

    function buildProgressPayload() {
      const viewer = document.getElementById("pdfViewer");
      return {
        playerName: authUsername,
        currentPage,
        maxPageVisited,
        currentPdfUrl,
        currentPdfRole,
        pdfScrollTop: viewer ? viewer.scrollTop : 0,
        inputValues: getInputSnapshot(),
        drawing: getDrawingSnapshot()
      };
    }

    async function applyProgressPayload(payload) {
      isApplyingRemoteData = true;

      const safe = payload && typeof payload === "object" ? payload : {};
      applyInputSnapshot(safe.inputValues || {});
      applyDrawingSnapshot(safe.drawing || null);

      currentPage = Number.isInteger(Number(safe.currentPage)) ? Number(safe.currentPage) : 1;
      if (currentPage < 1) currentPage = 1;
      if (currentPage > totalPages) currentPage = totalPages;

      maxPageVisited = Number.isInteger(Number(safe.maxPageVisited)) ? Number(safe.maxPageVisited) : currentPage;
      if (maxPageVisited < 1) maxPageVisited = 1;
      if (maxPageVisited > totalPages) maxPageVisited = totalPages;
      if (maxPageVisited < currentPage) maxPageVisited = currentPage;

      currentPdfUrl = String(safe.currentPdfUrl || "");
      currentPdfRole = String(safe.currentPdfRole || "");
      pdfScrollTop = Number.isFinite(Number(safe.pdfScrollTop)) ? Number(safe.pdfScrollTop) : 0;

      showPage(currentPage);

      if (currentPdfUrl) {
        try {
          await renderPdfIntoSecondCanvas(currentPdfUrl, currentPdfRole, true);
        } catch (err) {
          console.error(err);
        }
      } else {
        exitPdfMode();
      }

      isApplyingRemoteData = false;
    }

    async function apiFetch(path, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if (authToken) {
        headers.Authorization = "Bearer " + authToken;
      }

      const response = await fetch(WORKER_BASE_URL + path, {
        method: options.method || "GET",
        headers,
        body: options.body
      });

      const json = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(json.error || "Request failed");
      }
      return json;
    }

    async function registerUser() {
      const usernameInput = document.getElementById("auth-username");
      const passwordInput = document.getElementById("auth-password");

      const rawUsername = usernameInput.value || "";
      const username = rawUsername.trim().toLowerCase();
      const password = passwordInput.value;

      if (!username || !password) {
        setAuthStatus("Enter username and password", true);
        setAuthModalStatus("Enter username and password.", true);
        return;
      }

      if (/\s/.test(rawUsername)) {
        setAuthStatus("Username cannot contain spaces.", true);
        setAuthModalStatus("Username cannot contain spaces.", true);
        return;
      }

      try {
        setAuthStatus("Registering...");
        setAuthModalStatus("Registering...", false);
        const result = await apiFetch("/api/register", {
          method: "POST",
          body: JSON.stringify({ username, password, appId: APP_ID })
        });

        saveSessionLocally(result.token, result.username || username);
        passwordInput.value = "";
        await loadProgressFromServer();
        setAuthModalStatus("Account created.", false);
        closeAuthOverlay();
      } catch (err) {
        setAuthStatus(err.message || "Register failed", true);
        setAuthModalStatus(err.message || "Register failed", true);
      }
    }

    async function loginUser() {
      const usernameInput = document.getElementById("auth-username");
      const passwordInput = document.getElementById("auth-password");

      const rawUsername = usernameInput.value || "";
      const username = rawUsername.trim().toLowerCase();
      const password = passwordInput.value;

      if (!username || !password) {
        setAuthStatus("Enter username and password", true);
        setAuthModalStatus("Enter username and password.", true);
        return;
      }

      if (/\s/.test(rawUsername)) {
        setAuthStatus("Username cannot contain spaces.", true);
        setAuthModalStatus("Username cannot contain spaces.", true);
        return;
      }

      try {
        setAuthStatus("Logging in...");
        setAuthModalStatus("Logging in...", false);
        const result = await apiFetch("/api/login", {
          method: "POST",
          body: JSON.stringify({ username, password, appId: APP_ID })
        });

        saveSessionLocally(result.token, result.username || username);
        passwordInput.value = "";
        await loadProgressFromServer();
        setAuthModalStatus("Logged in.", false);
        closeAuthOverlay();
      } catch (err) {
        setAuthStatus(err.message || "Login failed", true);
        setAuthModalStatus(err.message || "Login failed", true);
      }
    }

    async function loadProgressFromServer() {
      if (!authToken) return;

      const result = await apiFetch("/api/load?appId=" + encodeURIComponent(APP_ID), {
        method: "GET"
      });

      if (result.username) {
        authUsername = result.username;
        localStorage.setItem(SESSION_STORAGE.username, authUsername);
      }

      updateAuthUI();
      await applyProgressPayload(result.saveData || {});
      setSaveStatus("Loaded");
    }

    async function saveProgressToServer() {
      if (!authToken || saveInFlight || isApplyingRemoteData) return;

      saveInFlight = true;
      try {
        await apiFetch("/api/save", {
          method: "POST",
          body: JSON.stringify({
            appId: APP_ID,
            saveData: buildProgressPayload()
          })
        });
        setAuthStatus("Logged in as " + (authUsername || "student"));
        setSaveStatus("Saved");
      } catch (err) {
        setAuthStatus(err.message || "Save failed", true);
        setSaveStatus("Save failed");
      } finally {
        saveInFlight = false;
        if (saveQueued) {
          saveQueued = false;
          saveProgressToServer();
        }
      }
    }

    function queueCloudSave() {
      if (isApplyingRemoteData || !authToken) return;

      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        if (saveInFlight) {
          saveQueued = true;
          return;
        }
        setSaveStatus("Saving...");
        saveProgressToServer();
      }, 900);
    }

    async function flushPendingSaveBeforeLogout() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = null;

      if (!authToken || isApplyingRemoteData) return;

      if (saveInFlight) {
        saveQueued = true;
        while (saveInFlight) {
          await wait(80);
        }
      }

      await saveProgressToServer();

      while (saveInFlight) {
        await wait(80);
      }
    }

    async function logoutUser() {
      try {
        setSaveStatus("Saving...");
        await flushPendingSaveBeforeLogout();
      } catch (err) {
        console.error(err);
      }

      try {
        if (authToken) {
          await apiFetch("/api/logout", {
            method: "POST",
            body: "{}"
          });
        }
      } catch (err) {
        console.error(err);
      }

      const prefill = authUsername || "";
      clearSessionLocally();
      setSaveStatus("Not saved yet");
      openAuthOverlay(prefill);
    }

    function updateProgress() {
      const pct = (maxPageVisited / totalPages) * 100;
      document.getElementById("progress").style.width = pct + "%";
      document.getElementById("progressText").innerText = pct.toFixed(0) + "% completed";
    }

    function showPage(p) {
      for (let i = 1; i <= totalPages; i++) {
        document.getElementById("page" + i).classList.remove("active");
      }
      document.getElementById("page" + p).classList.add("active");
      currentPage = p;

      if (currentPage > maxPageVisited) {
        maxPageVisited = currentPage;
      }

      document.getElementById("prev-btn").style.display = p === 1 ? "none" : "inline-block";
      document.getElementById("next-btn").style.display = p === totalPages ? "none" : "inline-block";
      updateProgress();
    }

    function validateCurrentPage() {
      if (currentPage === 3) {
        const inputs = document.querySelectorAll("#page3 input[type='text']");
        const cnt = Array.from(inputs).filter(x => x.value.trim() !== "").length;
        if (cnt < 4) {
          showMessagePopup(WRONG_MESSAGE);
          return false;
        }
      }

      if (currentPage === 17) {
        const inputs = document.querySelectorAll("#page17 .typeable");
        for (const inp of inputs) {
          if ((inp.value || "").trim() === "") {
            showMessagePopup(WRONG_MESSAGE);
            return false;
          }
        }
      }

      const chk = document.querySelectorAll("#page" + currentPage + " input[data-correct]");
      for (const inp of chk) {
        const exp = inp.getAttribute("data-correct");
        const mt = inp.getAttribute("data-match");
        const ent = (inp.value || "").trim().replace(/,/g, "");
        if (mt === "contains") {
          if (!ent.includes(exp)) {
            showMessagePopup(WRONG_MESSAGE);
            return false;
          }
        } else {
          if (ent !== exp) {
            showMessagePopup(WRONG_MESSAGE);
            return false;
          }
        }
      }

      return true;
    }

    async function prevPage() {
      if (!authToken) {
        openAuthOverlay(authUsername || "");
        return;
      }
      if (currentPage > 1) {
        const target = currentPage - 1;
        await runCanvasTransition(() => showPage(target));
        queueCloudSave();
      }
    }

    async function nextPage() {
      if (!authToken) {
        openAuthOverlay(authUsername || "");
        return;
      }
      if (!validateCurrentPage()) return;
      if (currentPage < totalPages) {
        const target = currentPage + 1;
        await runCanvasTransition(() => showPage(target));
        queueCloudSave();
      }
    }

    function initDrawingCanvas() {
      const canvas = document.getElementById("drawCanvas");
      if (!canvas) return;
      drawCtx = canvas.getContext("2d");

      canvas.addEventListener("mousedown", function (e) {
        if (drawingState.line) return;
        drawPreviewing = true;
        const rect = canvas.getBoundingClientRect();
        drawStartX = e.clientX - rect.left;
        drawStartY = e.clientY - rect.top;
      });

      canvas.addEventListener("mousemove", function (e) {
        if (!drawPreviewing || drawingState.line) return;
        const rect = canvas.getBoundingClientRect();
        const curX = e.clientX - rect.left;
        const curY = e.clientY - rect.top;
        drawStoredLine(curX, curY);
      });

      canvas.addEventListener("mouseup", function (e) {
        if (!drawPreviewing || drawingState.line) return;
        const rect = canvas.getBoundingClientRect();
        const endX = e.clientX - rect.left;
        const endY = e.clientY - rect.top;
        drawingState.line = { x1: drawStartX, y1: drawStartY, x2: endX, y2: endY };
        drawPreviewing = false;
        drawStoredLine();
        queueCloudSave();
      });

      canvas.addEventListener("mouseleave", function () {
        if (!drawPreviewing || drawingState.line) return;
        drawStoredLine();
      });

      document.getElementById("resetDraw").addEventListener("click", function () {
        drawingState.line = null;
        drawPreviewing = false;
        drawStoredLine();
        queueCloudSave();
      });
    }

    function exitPdfMode() {
      const roleContainer = document.getElementById("role-container");
      const viewer = document.getElementById("pdfViewer");
      const status = document.getElementById("pdfStatus");
      roleContainer.classList.remove("pdf-mode");
      viewer.style.display = "none";
      viewer.innerHTML = "";
      viewer.scrollTop = 0;
      status.style.display = "none";
      currentPdfUrl = "";
      currentPdfRole = "";
      pdfScrollTop = 0;
    }

    async function renderPdfIntoSecondCanvas(url, roleKey = "", preserveScroll = false) {
      const roleContainer = document.getElementById("role-container");
      const viewer = document.getElementById("pdfViewer");
      const status = document.getElementById("pdfStatus");

      currentPdfUrl = url;
      currentPdfRole = roleKey || "";
      viewer.innerHTML = "";
      viewer.style.display = "block";
      roleContainer.classList.add("pdf-mode");
      status.textContent = "Loading PDF...";
      status.style.display = "block";

      try {
        const loadingTask = pdfjsLib.getDocument({ url });
        const pdf = await loadingTask.promise;
        const targetWidth = 920;

        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const viewport1 = page.getViewport({ scale: 1 });
          const scale = targetWidth / viewport1.width;
          const viewport = page.getViewport({ scale });

          const canvas = document.createElement("canvas");
          canvas.className = "pdfPageCanvas";
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);

          const ctx = canvas.getContext("2d", { alpha: false });
          viewer.appendChild(canvas);
          await page.render({ canvasContext: ctx, viewport }).promise;
        }

        status.style.display = "none";
        viewer.scrollTop = preserveScroll ? pdfScrollTop : 0;
        queueCloudSave();
      } catch (err) {
        console.error("PDF.js render error:", err);
        exitPdfMode();
        showMessagePopup("PDF failed to load in the canvas. Check Console for details.");
      }
    }

    function initSecondCanvasHotspots() {
      document.getElementById("hotspot-officer").addEventListener("click", function () {
        renderPdfIntoSecondCanvas(ROLE_PDF_URLS.officer, "officer");
      });

      document.getElementById("hotspot-professor").addEventListener("click", function () {
        renderPdfIntoSecondCanvas(ROLE_PDF_URLS.professor, "professor");
      });

      document.getElementById("hotspot-hacker").addEventListener("click", function () {
        renderPdfIntoSecondCanvas(ROLE_PDF_URLS.hacker, "hacker");
      });

      document.getElementById("hotspot-video").addEventListener("click", function () {
        window.open(ROLE_VIDEO_URL, "_blank");
      });

      document.getElementById("pdfViewer").addEventListener("scroll", function (e) {
        pdfScrollTop = e.target.scrollTop;
        queueCloudSave();
      });
    }

    function initOpenFileButton() {
      document.getElementById("openFileBtn").addEventListener("click", function () {
        if (!currentPdfUrl) {
          showMessagePopup("Pick a role file first.");
          return;
        }
        window.open(currentPdfUrl, "_blank");
      });
    }

    function initUnlockButton() {
      const inp = document.getElementById("p18box1");
      if (!inp) return;

      let justOpened = false;

      inp.addEventListener("input", function () {
        const code = (inp.value || "").trim();

        if (code === "31621" && !justOpened) {
          justOpened = true;
          window.open(FINAL_UNLOCK_URL, "_blank");
          inp.value = "";
          queueCloudSave();

          setTimeout(() => {
            justOpened = false;
          }, 300);
        }
      });
    }

    function initTranslatorWidget() {
      const widget = document.getElementById("side-widget");
      const collapseBtn = document.getElementById("collapse-widget");

      collapseBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        widget.classList.add("collapsed");
      });

      widget.addEventListener("click", function () {
        if (widget.classList.contains("collapsed")) {
          widget.classList.remove("collapsed");
        }
      });
    }

    function initTranslationScreenshotTool() {
      document.getElementById("select-text").addEventListener("click", function () {
        const overlay = document.createElement("div");
        overlay.id = "selection-overlay";
        document.body.appendChild(overlay);

        let startX, startY, selectionBox;

        overlay.addEventListener("mousedown", function (e) {
          startX = e.clientX;
          startY = e.clientY;
          selectionBox = document.createElement("div");
          selectionBox.id = "selection-box";
          selectionBox.style.left = startX + "px";
          selectionBox.style.top = startY + "px";
          selectionBox.style.width = "0px";
          selectionBox.style.height = "0px";
          overlay.appendChild(selectionBox);

          function mouseMoveHandler(e) {
            const currentX = e.clientX;
            const currentY = e.clientY;
            const left = Math.min(startX, currentX);
            const top = Math.min(startY, currentY);
            const width = Math.abs(currentX - startX);
            const height = Math.abs(currentY - startY);
            selectionBox.style.left = left + "px";
            selectionBox.style.top = top + "px";
            selectionBox.style.width = width + "px";
            selectionBox.style.height = height + "px";
          }

          function mouseUpHandler() {
            overlay.removeEventListener("mousemove", mouseMoveHandler);
            overlay.removeEventListener("mouseup", mouseUpHandler);
            const rect = selectionBox.getBoundingClientRect();
            document.body.removeChild(overlay);

            const target = document.getElementById("app-container");
            const targetRect = target.getBoundingClientRect();

            html2canvas(target, { useCORS: true, allowTaint: false }).then(canvas => {
              const scaleFactor = canvas.width / targetRect.width;
              const sx = (rect.left - targetRect.left) * scaleFactor;
              const sy = (rect.top - targetRect.top) * scaleFactor;
              const sWidth = rect.width * scaleFactor;
              const sHeight = rect.height * scaleFactor;

              const croppedCanvas = document.createElement("canvas");
              croppedCanvas.width = sWidth;
              croppedCanvas.height = sHeight;

              const ctx = croppedCanvas.getContext("2d");
              ctx.drawImage(canvas, sx, sy, sWidth, sHeight, 0, 0, sWidth, sHeight);

              croppedCanvas.toBlob(blob => {
                if (!blob) return;
                const item = new ClipboardItem({ "image/png": blob });
                navigator.clipboard.write([item]).then(() => {
                  showMessagePopup("Screenshot copied to clipboard.");
                }).catch(err => {
                  console.error("Failed to copy screenshot to clipboard", err);
                  showMessagePopup("Failed to copy screenshot to clipboard.");
                });
              });
            });
          }

          overlay.addEventListener("mousemove", mouseMoveHandler);
          overlay.addEventListener("mouseup", mouseUpHandler);
        });
      });
    }

    function initCloudSaveInputs() {
      getTypeableInputs().forEach(input => {
        input.addEventListener("input", function () {
          queueCloudSave();
        });
      });
    }

    function showTutorial() {
      const alreadySeen = localStorage.getItem(TUTORIAL_STORAGE_KEY);
      if (alreadySeen === "yes") {
        maybeRequireAuthOverlay();
        return;
      }

      tutorialIndex = 0;
      document.getElementById("tutorialImage").src = TUTORIAL_IMAGES[tutorialIndex];
      document.getElementById("tutorialOverlay").style.display = "flex";
    }

    function nextTutorialSlide() {
      tutorialIndex++;
      if (tutorialIndex >= TUTORIAL_IMAGES.length) {
        document.getElementById("tutorialOverlay").style.display = "none";
        localStorage.setItem(TUTORIAL_STORAGE_KEY, "yes");
        maybeRequireAuthOverlay();
        return;
      }
      document.getElementById("tutorialImage").src = TUTORIAL_IMAGES[tutorialIndex];
    }

    function initTutorial() {
      document.getElementById("tutorialNext").addEventListener("click", nextTutorialSlide);
      TUTORIAL_IMAGES.forEach(url => {
        const pre = new Image();
        pre.src = url;
      });
      showTutorial();
    }

    document.addEventListener("DOMContentLoaded", async function () {
      restoreSessionLocally();
      initDrawingCanvas();
      initSecondCanvasHotspots();
      initOpenFileButton();
      initUnlockButton();
      initTranslatorWidget();
      initTranslationScreenshotTool();
      initCloudSaveInputs();

      document.getElementById("introBtn").addEventListener("click", openIntro);
      document.getElementById("authRegisterBtn").addEventListener("click", registerUser);
      document.getElementById("authLoginBtn").addEventListener("click", loginUser);
      document.getElementById("logoutBtn").addEventListener("click", logoutUser);
      document.getElementById("prev-btn").addEventListener("click", prevPage);
      document.getElementById("next-btn").addEventListener("click", nextPage);

      document.getElementById("auth-password").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          loginUser();
        }
      });

      showPage(currentPage);
      drawStoredLine();

      if (authToken) {
        try {
          await loadProgressFromServer();
        } catch (err) {
          console.error(err);
          clearSessionLocally();
          showPage(currentPage);
        }
      }

      initTutorial();
    });
  </script>
